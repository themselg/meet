<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sala de Reuniones</title>
<link rel="stylesheet" href="/fonts/fonts.css">
<script src="/vendor/qrcode.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Roboto Flex', system-ui, sans-serif;
    color: var(--onsurf);
    overflow: hidden; cursor: none; user-select: none;
  }

  /* Esquemas tonales Material You (del diseño MD3) */
  body[data-scheme="oceano"] {
    --wall: radial-gradient(130% 120% at 12% 0%, #1c4a8a 0%, #0f2f5e 45%, #071527 100%);
    --scrim: linear-gradient(165deg, rgba(9,34,68,0.34) 0%, rgba(7,22,45,0.58) 55%, rgba(5,16,34,0.80) 100%);
    --surf: #132B49; --onsurf: #CFE1FF; --onsurfvar: #A6C4EC; --outline: #3A5478;
  }
  body[data-scheme="bosque"] {
    --wall: radial-gradient(130% 120% at 12% 0%, #0e6a5e 0%, #0a453d 42%, #04221e 100%);
    --scrim: linear-gradient(160deg, rgba(4,40,36,0.10), rgba(2,20,18,0.5));
    --surf: #12332D; --onsurf: #C9F0E7; --onsurfvar: #9EC6BD; --outline: #2E4A44;
  }
  body[data-scheme="lavanda"] {
    --wall: radial-gradient(130% 120% at 12% 0%, #533490 0%, #3a2668 42%, #17122b 100%);
    --scrim: linear-gradient(160deg, rgba(40,24,80,0.12), rgba(20,12,45,0.5));
    --surf: #2A2140; --onsurf: #E7DDFF; --onsurfvar: #CBB9EC; --outline: #4A3E6E;
  }
  body[data-scheme="atardecer"] {
    --wall: radial-gradient(130% 120% at 12% 0%, #9a4222 0%, #612913 42%, #2c130a 100%);
    --scrim: linear-gradient(160deg, rgba(80,32,14,0.12), rgba(40,16,8,0.5));
    --surf: #3A231A; --onsurf: #FFE0D4; --onsurfvar: #ECC2B2; --outline: #6E4636;
  }
  /* Imagen propia: esquema neutro oscuro (diseñado para foto + scrim) */
  body[data-scheme="custom"] {
    --wall: #0a1e38;
    --scrim: linear-gradient(165deg, rgba(9,34,68,0.34) 0%, rgba(7,22,45,0.58) 55%, rgba(5,16,34,0.80) 100%);
    --surf: #132B49; --onsurf: #CFE1FF; --onsurfvar: #A6C4EC; --outline: #3A5478;
  }

  #bg { position: fixed; inset: 0; background: var(--wall); background-size: cover; background-position: center; }
  #scrim { position: fixed; inset: 0; background: var(--scrim); }

  .clock-block { position: fixed; top: 4.6vh; left: 3.4vw; }
  #clock {
    font-weight: 500; font-size: 11vw; line-height: 0.9;
    letter-spacing: -0.03em; font-variation-settings: 'opsz' 144;
    color: var(--onsurf);
  }
  #date { font-size: 2vw; color: var(--onsurfvar); margin-top: 1.2vh; text-transform: capitalize; }

  .pill {
    position: fixed; top: 4.6vh; right: 3.4vw;
    display: inline-flex; align-items: center; gap: 0.55em;
    background: #B3261E; color: #fff;
    padding: 0.65em 1.15em; border-radius: 100px;
    font-size: 1.25vw; font-weight: 600;
    box-shadow: 0 2px 8px rgba(179,38,30,0.4);
  }
  .pill .msr { font-size: 1.35em; }

  .card {
    position: fixed; bottom: 4.4vh; right: 2.9vw;
    background: var(--surf); border-radius: 28px;
    padding: 1.9vw; width: clamp(280px, 24vw, 400px);
    box-shadow: 0 10px 28px -8px rgba(0,0,0,0.6);
  }
  .qr-box {
    background: #fff; border-radius: 16px; padding: 1.1vw;
    width: 74%; aspect-ratio: 1; margin: 0 auto 1.3vw;
    display: flex; align-items: center; justify-content: center;
  }
  .qr-box svg { width: 100%; height: 100%; display: block; }
  .card-title {
    text-align: center; font-weight: 500; font-size: 1.35vw; line-height: 1.25;
    letter-spacing: -0.01em; color: var(--onsurf); margin-bottom: 1.3vw;
  }
  .divider { height: 1px; background: var(--outline); margin-bottom: 1.1vw; }
  .visit { text-align: center; font-size: 0.95vw; color: var(--onsurfvar); margin-bottom: 0.35vw; }
  .url {
    text-align: center; font-family: 'Roboto Mono', monospace;
    font-size: 1.1vw; color: var(--onsurf); font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .pin-wrap {
    display: flex; align-items: center; justify-content: space-between; gap: 1vw;
    margin-top: 1.1vw; padding: 0.85vw 1vw;
    border-radius: 14px; border: 1px solid var(--outline);
    background: rgba(255,255,255,0.05);
  }
  .pin-label {
    color: var(--onsurfvar); font-size: 0.95vw; line-height: 1.15;
  }
  .pin {
    color: var(--onsurf); font: 700 2.1vw/1 'Roboto Mono', monospace;
    letter-spacing: 0.12em;
  }

  /* Tarjeta offline: misma tarjeta, contenido intercambiado */
  .offline-box {
    width: 74%; aspect-ratio: 1; margin: 0 auto 1.3vw;
    border-radius: 16px; background: rgba(255,255,255,0.05);
    border: 1.5px dashed var(--outline);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.9vw;
  }
  .offline-box .big { font-size: 4.4vw; color: #FFB4AB; }
  .offline-box .small { font-size: 1.6vw; color: var(--onsurfvar); }
  .offline-sub {
    text-align: center; font-size: 1vw; color: var(--onsurfvar); line-height: 1.4;
  }
  [hidden] { display: none !important; }
</style>
</head>
<body data-scheme="bosque">
  <div id="bg"></div>
  <div id="scrim"></div>

  <div class="clock-block">
    <div id="clock">--:--</div>
    <div id="date"></div>
  </div>

  <div class="pill" id="offlinePill" hidden>
    <span class="msr">cloud_off</span>Sin conexión
  </div>

  <div class="card">
    <div id="qrContent">
      <div class="qr-box" id="qrBox"></div>
      <div class="card-title">Escanea para iniciar una reunión</div>
      <div class="divider"></div>
      <div class="visit">Visita</div>
      <div class="url" id="displayUrl">…</div>
      <div class="pin-wrap">
        <div class="pin-label">PIN de la sala</div>
        <div class="pin" id="pairingPin">------</div>
      </div>
    </div>
    <div id="offlineContent" hidden>
      <div class="offline-box">
        <span class="msr big">cloud_off</span>
        <span class="msr small">sync</span>
      </div>
      <div class="card-title" style="margin-bottom:0.6vw;">No disponible</div>
      <div class="offline-sub">Se perdió la conexión a internet.<br>Reintentando…</div>
    </div>
  </div>

<script>
  function tick() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('es-MX', { hour: 'numeric', minute: '2-digit', hour12: false });
    document.getElementById('date').textContent =
      now.toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'long' });
  }
  tick();
  setInterval(tick, 5000);

  let qrUrl = null;
  function publicUrl(url) {
    try {
      const parsed = new URL(url, window.location.href);
      parsed.searchParams.delete('pin');
      return parsed.href.replace(/^https?:\/\//, '').replace(/\/$/, '');
    } catch (_) {
      return url.replace(/^https?:\/\//, '').replace(/\?.*$/, '');
    }
  }

  function renderQr(url) {
    if (!url || url === qrUrl) return;
    qrUrl = url;
    const qr = qrcode(0, 'M');
    qr.addData(url);
    qr.make();
    document.getElementById('qrBox').innerHTML =
      qr.createSvgTag({ cellSize: 4, margin: 0, scalable: true });
    document.getElementById('displayUrl').textContent = publicUrl(url);
  }

  function applyWallpaper(state) {
    const name = state.wallpaper || 'bosque';
    document.body.dataset.scheme = name;
    document.getElementById('bg').style.backgroundImage =
      name === 'custom' ? `url(/wallpaper?v=${state.wallpaper_version})` : '';
  }

  function setOffline(offline) {
    document.getElementById('offlinePill').hidden = !offline;
    document.getElementById('offlineContent').hidden = !offline;
    document.getElementById('qrContent').hidden = offline;
  }

  async function loadStatus() {
    try {
      const res = await fetch('/api/status?kiosk=1');
      const data = await res.json();
      if (data.display_url) renderQr(data.display_url);
      if (data.pairing_pin) document.getElementById('pairingPin').textContent = data.pairing_pin;
      applyWallpaper(data);
      setOffline(data.online === false);
    } catch (_) {
      setOffline(true); // sin backend tampoco hay reuniones
    }
  }
  loadStatus();
  setInterval(loadStatus, 10000);

  const es = new EventSource('/api/events');
  es.addEventListener('meeting', (e) => {
    const { url } = JSON.parse(e.data);
    window.location.href = url;
  });
  // En producción el servicio del kiosko se reinicia; esto cubre el modo desarrollo.
  es.addEventListener('end', () => window.location.reload());
  es.addEventListener('settings', (e) => applyWallpaper(JSON.parse(e.data)));
</script>
</body>
</html>
